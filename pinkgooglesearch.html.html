<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff0f5; /* Soft Lavender Blush */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            /* Cool Cursor: Change the default pointer to a precision cross */
            cursor: crosshair; 
        }

        .btn-container {
            position: relative;
        }

        .google-link {
            text-decoration: none;
            color: white;
            background: #ff69b4; /* Hot Pink */
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 20px;
            letter-spacing: 1px;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3);
            position: relative;
            z-index: 2;
        }

        /* The Moving Part: A gentle pulsing ring */
        .google-link::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50px;
            border: 2px solid #ff69b4;
            animation: pulse 2s infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Hover Effects */
        .google-link:hover {
            transform: translateY(-5px);
            background: #ff1493; /* Deeper pink on hover */
            box-shadow: 0 15px 30px rgba(255, 20, 147, 0.5);
        }
    </style>
</head>
<body>

    <div class="btn-container">
        <a href="https://www.google.com" target="_blank" class="google-link">
            Search Google
        </a>
    </div>

</body>
</html>
